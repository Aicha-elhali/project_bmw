<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<style>
  :root {
    --bg:        #F5F0EB;
    --bg-alt:    #EBE5DE;
    --bg-input:  #FFFFFF;
    --border:    #D6CFC7;
    --border-focus: #c96442;
    --text:      #2A2420;
    --text-sec:  #6B6360;
    --text-dim:  #9A9490;
    --accent:    #c96442;
    --accent-h:  #d4734f;
    --accent-pressed: #b55838;
    --success:   #4a9e6e;
    --error:     #d44a3a;
    --radius:    12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Söhne', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header .logo {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #c96442 0%, #a84e32 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .header .logo svg {
    width: 16px;
    height: 16px;
  }

  .header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .header .version {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* Server URL (collapsible) */
  .server-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .server-row label {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .server-row input {
    flex: 1;
    padding: 6px 8px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-sec);
    font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    outline: none;
    transition: border-color 0.15s;
  }
  .server-row input:focus { border-color: var(--border-focus); }

  /* Frame info */
  .frame-info {
    display: none;
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text-sec);
  }
  .frame-info strong { color: var(--text); font-weight: 600; }

  /* User prompt */
  .prompt-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .prompt-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .prompt-label .optional {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .prompt-textarea {
    width: 100%;
    min-height: 72px;
    max-height: 200px;
    padding: 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  .prompt-textarea:focus { border-color: var(--border-focus); }
  .prompt-textarea::placeholder { color: var(--text-dim); }

  .prompt-hint {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  /* Generate button */
  .btn-generate {
    width: 100%;
    padding: 8px 12px;
    border: none;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s, transform 0.1s;
    background: var(--accent);
    color: #fff;
  }
  .btn-generate:hover:not(:disabled) { background: var(--accent-h); }
  .btn-generate:active:not(:disabled) { background: var(--accent-pressed); transform: scale(0.98); }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Progress */
  .progress {
    display: none;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
  }

  .phase {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12px;
    color: var(--text-sec);
    padding: 5px 0;
    line-height: 1.4;
  }

  .phase .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    margin-top: 5px;
    transition: background 0.2s;
  }

  .phase.active .dot { background: var(--accent); animation: pulse 1.2s infinite; }
  .phase.done .dot { background: var(--success); }
  .phase.error .dot { background: var(--error); }
  .phase.active { color: var(--text); }
  .phase.done { color: var(--text-sec); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Result */
  .result { display: none; flex-direction: column; gap: 10px; }

  .btn-open {
    width: 100%;
    padding: 8px 12px;
    border: none;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    background: var(--success);
    color: #fff;
    transition: filter 0.15s;
  }
  .btn-open:hover { filter: brightness(1.1); }

  /* Error */
  .error-box {
    display: none;
    background: rgba(212,74,58,0.08);
    border: 1px solid rgba(212,74,58,0.3);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--error);
    word-break: break-word;
    line-height: 1.4;
  }

  /* Footer */
  .footer {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    margin-top: auto;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="#fff" opacity="0.9"/>
    </svg>
  </div>
  <h1>Fluid Prototype</h1>
  <span class="version">v1.0</span>
</div>

<div class="divider"></div>

<div class="server-row">
  <label>Server</label>
  <input type="text" id="serverUrl" value="http://localhost:3001/api/generate" />
</div>

<div class="frame-info" id="frameInfo">
  Selected: <strong id="frameName">—</strong>
  <span id="frameSize"></span>
</div>

<div class="prompt-section">
  <div class="prompt-label">
    Beschreibung
    <span class="optional">optional</span>
  </div>
  <textarea
    class="prompt-textarea"
    id="userPrompt"
    placeholder="Beschreibe Interaktionen, Verhalten oder spezielle Anforderungen...

z.B. Beim Klick auf 'Annehmen' soll ein gruener Puls-Effekt erscheinen. Die Anruf-Karte soll nach 3s automatisch minimiert werden."
  ></textarea>
  <div class="prompt-hint">
    Deine Beschreibung hat Prioritaet ueber den BMW Design Guide und wird von allen Agents beruecksichtigt.
  </div>
</div>

<button class="btn-generate" id="generateBtn" onclick="startGeneration()">
  Generate Prototype
</button>

<div class="progress" id="progress"></div>

<div class="error-box" id="errorBox"></div>

<div class="result" id="result">
  <button class="btn-open" onclick="openPreview()">Preview oeffnen</button>
</div>

<div class="footer">
  BMW HMI Pipeline &middot; Figma Plugin
</div>

<script>
  var previewUrl = '';
  var currentFrameData = null;

  function saveUrl(url) {
    try { localStorage.setItem('fluid-proto-url', url); } catch (e) {}
  }
  function loadUrl() {
    try { return localStorage.getItem('fluid-proto-url'); } catch (e) { return null; }
  }

  var saved = loadUrl();
  if (saved) document.getElementById('serverUrl').value = saved;

  onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'frame-data') {
      currentFrameData = msg.data;
      const info = document.getElementById('frameInfo');
      info.style.display = 'block';
      document.getElementById('frameName').textContent = msg.meta.name;
      document.getElementById('frameSize').textContent =
        ` (${Math.round(msg.meta.width)} x ${Math.round(msg.meta.height)})`;
      sendToServer(msg.data);
    }

    if (msg.type === 'error') {
      showError(msg.message);
      setGenerating(false);
    }
  };

  function setGenerating(active) {
    document.getElementById('generateBtn').disabled = active;
    document.getElementById('generateBtn').textContent = active
      ? 'Generating...'
      : 'Generate Prototype';
  }

  function showError(message) {
    const box = document.getElementById('errorBox');
    box.textContent = message;
    box.style.display = 'block';
  }

  function clearState() {
    document.getElementById('errorBox').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('progress').style.display = 'flex';
    document.getElementById('progress').innerHTML = '';
    previewUrl = '';
  }

  function addPhase(id, label) {
    var container = document.getElementById('progress');
    container.innerHTML = '<div class="phase active" id="phase-' + id + '"><div class="dot"></div><span>' + label + '</span></div>';
  }

  function startGeneration() {
    clearState();
    setGenerating(true);

    var url = document.getElementById('serverUrl').value.trim();
    saveUrl(url);

    parent.postMessage({ pluginMessage: { type: 'serialize-selection' } }, '*');
  }

  async function sendToServer(frameData) {
    const url = document.getElementById('serverUrl').value.trim();
    const userPrompt = document.getElementById('userPrompt').value.trim();

    if (userPrompt) {
      frameData.userPrompt = userPrompt;
    }

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(frameData),
      });

      if (!response.ok) {
        throw new Error('Server responded with ' + response.status);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.trim()) continue;
          try {
            const event = JSON.parse(line);
            handleServerEvent(event);
          } catch (e) {}
        }
      }

      if (buffer.trim()) {
        try { handleServerEvent(JSON.parse(buffer)); } catch (e) {}
      }

    } catch (err) {
      showError('Verbindungsfehler: ' + err.message + '\n\nLaeuft der Server? npm run server');
      setGenerating(false);
    }
  }

  function handleServerEvent(event) {
    if (event.status === 'progress') {
      addPhase(event.phase, event.message);
    }

    if (event.status === 'done') {
      document.querySelectorAll('.phase.active').forEach(p => p.className = 'phase done');
      previewUrl = event.previewUrl;
      document.getElementById('result').style.display = 'flex';
      setGenerating(false);

      parent.postMessage({
        pluginMessage: { type: 'notify', message: 'Prototype ready!', timeout: 5000 }
      }, '*');
    }

    if (event.status === 'error') {
      const active = document.querySelector('.phase.active');
      if (active) active.className = 'phase error';
      showError(event.message);
      setGenerating(false);
    }
  }

  function openPreview() {
    if (previewUrl) {
      parent.postMessage({ pluginMessage: { type: 'open-url', url: previewUrl } }, '*');
    }
  }
</script>
</body>
</html>
