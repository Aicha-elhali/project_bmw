<!-- WhatsApp call modal — back chevron + app label, avatar area, 3 actions -->
<div data-name="phoneScreen" style="position:relative;width:1920px;height:720px;background:#0A1428;font-family:Inter,system-ui,sans-serif;color:#FFFFFF;">
  <div data-name="popup" style="position:absolute;top:60px;left:50%;transform:translateX(-50%);width:560px;height:520px;background:linear-gradient(180deg,#243757 0%,#1B2A45 100%);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06);padding:24px 32px 32px;display:flex;flex-direction:column;">

    <!-- Header row: back chevron + app label + timer -->
    <div data-name="header" style="display:flex;align-items:center;gap:12px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.08);">
      <div data-name="iconButton" style="width:48px;height:48px;border-radius:999px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M14.5 5l-7 7 7 7" stroke="#FFFFFF" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div data-name="heading" style="font-size:24px;font-weight:400;color:#FFFFFF;letter-spacing:-0.01em;">WhatsApp</div>
      <div style="flex:1;"></div>
      <div data-name="label" style="display:inline-flex;align-items:center;gap:6px;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:#3CD278;font-variant-numeric:tabular-nums;">
        <span style="width:7px;height:7px;border-radius:999px;background:#3CD278;box-shadow:0 0 6px #3CD278;"></span>
        00:42
      </div>
    </div>

    <!-- Avatar + name -->
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px 0;">
      <div data-name="image" style="width:160px;height:160px;border-radius:999px;background:repeating-linear-gradient(45deg,rgba(168,181,200,0.25) 0 1px,transparent 1px 8px);border:1.5px dashed rgba(255,255,255,0.16);display:flex;align-items:center;justify-content:center;">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="9" r="4" stroke="#A8B5C8" stroke-width="1.5"/>
          <path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6" stroke="#A8B5C8" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div data-name="heading" style="font-size:32px;font-weight:300;color:#FFFFFF;line-height:1.2;letter-spacing:-0.01em;">Anna Berger</div>
      <div data-name="label" style="font-size:14px;letter-spacing:0.06em;text-transform:uppercase;color:#A8B5C8;">Verbunden</div>
    </div>

    <!-- Action row -->
    <div data-name="list" style="display:flex;justify-content:space-around;align-items:center;gap:24px;padding:0 24px;">

      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <div data-name="iconButton" style="width:88px;height:88px;border-radius:999px;border:1.5px solid rgba(255,255,255,0.16);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
            <path d="M4 9h3l4-3v12l-4-3H4z" stroke="#FFFFFF" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M15 9.5c1 .8 1 4.2 0 5M17.5 7c2 1.7 2 8.3 0 10" stroke="#FFFFFF" stroke-width="1.75" stroke-linecap="round"/>
          </svg>
        </div>
        <div data-name="label" style="font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:#A8B5C8;">Lautsprecher</div>
      </div>

      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <div data-name="iconButton" style="width:104px;height:104px;border-radius:999px;background:#E63946;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 24px rgba(230,57,70,0.5);">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
            <path d="M3.5 14c0-3 4-5.5 8.5-5.5S20.5 11 20.5 14" stroke="#FFFFFF" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3.7 16.4l3.4-2 1.6 2c.4.5.4 1.2 0 1.7l-1 1.1a1.7 1.7 0 0 1-2 .4l-1.7-1c-.7-.4-.9-1.4-.3-2.2z" stroke="#FFFFFF" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div data-name="label" style="font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:#A8B5C8;">Beenden</div>
      </div>

      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <div data-name="iconButton" style="width:88px;height:88px;border-radius:999px;border:1.5px solid rgba(255,255,255,0.16);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
            <rect x="9.5" y="3.5" width="5" height="11" rx="2.5" stroke="#FFFFFF" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 11a6 6 0 0 0 12 0M12 17v3M9 20.5h6" stroke="#FFFFFF" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div data-name="label" style="font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:#A8B5C8;">Mikro</div>
      </div>

    </div>
  </div>
</div>
