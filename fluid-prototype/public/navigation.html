<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW iDrive</title>
<style>
  :root {
    --color-primary: #1a6fd4;
    --color-primary-hover: #1558aa;
    --color-primary-light: #2a82f0;
    --color-primary-subtle: #0d2a4e;
    --color-background: #05101e;
    --color-background-light: #0a1c2e;
    --color-surface: #0e2340;
    --color-text: #ffffff;
    --color-text-dark: #05101e;
    --color-text-secondary: #a0b8d0;
    --color-text-muted: #5a7a96;
    --color-text-on-dark: #ffffff;
    --color-text-on-dark-secondary: #b0c8e0;
    --color-text-on-dark-muted: #607080;
    --color-accent: #1e7fff;
    --color-border: #1a3a5c;
    --color-border-dark: #0a1e30;
    --color-focus-ring: #1e7fff;
    --color-success: #00c853;
    --color-error: #e53935;
    --color-overlay: rgba(5, 16, 30, 0.75);
    --color-shadow: rgba(0, 0, 0, 0.6);
    --color-shadow-strong: rgba(0, 0, 0, 0.85);
    --color-background-gradient: linear-gradient(180deg, #0a1c2e 0%, #05101e 100%);
    --color-card-gradient: linear-gradient(135deg, #1a3a6e 0%, #0e2340 60%, #0a1828 100%);
    --color-accent-glow: rgba(30, 127, 255, 0.35);
    --color-map-teal: #1a4a5a;
    --color-map-blue: #1464c8;
    --color-status-bar: #0a1828;
    --color-warning-yellow: #f5c400;
    --color-left-rail-bg: rgba(10, 24, 40, 0.9);
    --spacing-xs: 0.25rem;
    --spacing-sm: 0.5rem;
    --spacing-md: 1rem;
    --spacing-lg: 1.5rem;
    --spacing-xl: 2rem;
    --radius-sm: 0.25rem;
    --radius-md: 0.5rem;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.5);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.7);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial', 'Helvetica', sans-serif;
  }

  .screen {
    width: 1260px;
    height: 580px;
    background: var(--color-background);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* STATUS BAR */
  .status-bar {
    height: 36px;
    background: var(--color-status-bar);
    display: flex;
    align-items: center;
    padding: 0 var(--spacing-md);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .status-bar-left {
    display: flex;
    align-items: center;
    gap: var(--spacing-md);
  }

  .status-bar-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: var(--color-text);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
  }

  .status-bar-center-line {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .demo-mode-text {
    color: var(--color-text);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.12em;
  }

  .demo-line {
    width: 120px;
    height: 2px;
    background: var(--color-text-muted);
    margin-top: 2px;
  }

  .status-bar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--color-text);
    font-size: 0.7rem;
  }

  .status-icon {
    display: flex;
    align-items: center;
  }

  .status-time {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--color-text);
  }

  .status-time sup {
    font-size: 0.5rem;
    vertical-align: super;
  }

  .status-temp {
    color: var(--color-text);
    font-size: 0.7rem;
  }

  .status-avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #c87040;
  }

  /* MAIN CONTENT */
  .main-content {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 62px;
    background: var(--color-left-rail-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: var(--spacing-sm) 0;
    gap: var(--spacing-lg);
    flex-shrink: 0;
    position: relative;
    z-index: 5;
    border-right: 1px solid var(--color-border-dark);
  }

  .sidebar-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text);
  }

  /* LEFT PANEL */
  .left-panel {
    width: 420px;
    flex-shrink: 0;
    background: var(--color-background-light);
    display: flex;
    flex-direction: column;
    padding: var(--spacing-sm) 0;
    gap: var(--spacing-sm);
    position: relative;
    z-index: 4;
    border-right: 3px solid var(--color-primary);
  }

  /* Blue accent line on left side */
  .left-panel::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--color-primary);
  }

  /* GRID CARDS SECTION */
  .grid-section {
    background: var(--color-surface);
    margin: var(--spacing-sm) var(--spacing-sm) 0 var(--spacing-sm);
    clip-path: polygon(16px 0, 100% 0, calc(100% - 16px) 100%, 0 100%);
    padding: var(--spacing-sm);
    position: relative;
  }

  .grid-section-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: var(--spacing-xs);
    height: 210px;
  }

  .grid-card {
    background: var(--color-primary-subtle);
    clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: var(--spacing-sm) var(--spacing-sm);
    position: relative;
    cursor: pointer;
    border: 1px solid var(--color-border);
  }

  .grid-card-1 {
    background: linear-gradient(135deg, #1a3a6e 0%, #0e2340 100%);
  }

  .grid-card-content {
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
  }

  .chat-bmw-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, #e040fb, #f06292, #ff7043);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 0.45rem;
    color: white;
    font-weight: 700;
    letter-spacing: 0;
    padding: 2px;
  }

  .card-label {
    color: var(--color-text);
    font-size: 0.75rem;
    font-weight: 600;
  }

  .card-number {
    position: absolute;
    bottom: 4px;
    right: 12px;
    color: var(--color-text-muted);
    font-size: 0.65rem;
  }

  .shortcut-icon {
    color: var(--color-text);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* CONNECT SECTION */
  .connect-section {
    background: var(--color-surface);
    margin: var(--spacing-sm);
    clip-path: polygon(16px 0, 100% 0, calc(100% - 16px) 100%, 0 100%);
    padding: var(--spacing-md) var(--spacing-lg);
    display: flex;
    flex-direction: column;
    gap: var(--spacing-sm);
    flex: 1;
  }

  .connect-title {
    color: var(--color-text-secondary);
    font-size: 0.8rem;
    margin-left: 8px;
  }

  .connect-content {
    display: flex;
    align-items: center;
    gap: var(--spacing-md);
  }

  .phone-mockup {
    width: 56px;
    height: 90px;
    background: linear-gradient(180deg, #2a4a7a 0%, #1a3a6e 100%);
    border-radius: 8px;
    border: 2px solid var(--color-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .connect-btn {
    background: var(--color-primary);
    clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
    color: var(--color-text);
    font-size: 0.8rem;
    font-weight: 600;
    padding: var(--spacing-sm) var(--spacing-lg);
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
    cursor: pointer;
  }

  /* MAP AREA */
  .map-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--color-map-teal);
  }

  .map-bg {
    position: absolute;
    inset: 0;
    background: var(--color-map-teal);
  }

  /* Road network SVG */
  .map-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Map overlay buttons */
  .centre-vehicle-btn {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-60%);
    background: var(--color-primary);
    color: var(--color-text);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
    clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
    cursor: pointer;
  }

  .assist-view-btn {
    position: absolute;
    bottom: 16px;
    right: 8px;
    background: var(--color-primary);
    color: var(--color-text);
    font-size: 0.6rem;
    font-weight: 600;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
    cursor: pointer;
    line-height: 1.2;
    text-align: center;
  }

  /* Warning triangle on map */
  .map-warning {
    position: absolute;
    top: 60px;
    left: 48%;
    transform: translateX(-50%);
  }

  /* Road number badge */
  .road-badge {
    position: absolute;
    top: 95px;
    left: 32%;
    background: var(--color-warning-yellow);
    color: var(--color-text-dark);
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 2px;
  }

  /* BOTTOM BAR */
  .bottom-bar {
    height: 52px;
    background: var(--color-background);
    display: flex;
    align-items: center;
    border-top: 1px solid var(--color-border-dark);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .bottom-divider {
    width: 1px;
    height: 32px;
    background: var(--color-border);
    flex-shrink: 0;
  }

  /* Left AC controls */
  .ac-left {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 8px 0 4px;
    min-width: 180px;
  }

  .ac-icon {
    display: flex;
    align-items: center;
    color: var(--color-text-secondary);
  }

  .ac-control {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .ac-top {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .ac-btn {
    color: var(--color-text-secondary);
    font-size: 0.85rem;
    font-weight: 300;
    cursor: pointer;
    padding: 0 2px;
  }

  .ac-status {
    display: flex;
    align-items: center;
    gap: 3px;
    color: var(--color-text);
    font-size: 0.75rem;
    font-weight: 700;
  }

  .ac-fan-icon {
    color: var(--color-text-secondary);
    display: flex;
    align-items: center;
  }

  .ac-label {
    color: var(--color-text-muted);
    font-size: 0.55rem;
    letter-spacing: 0.05em;
    margin-top: 1px;
  }

  .ac-bar {
    width: 70px;
    height: 2px;
    background: linear-gradient(to right, var(--color-primary), var(--color-error));
    margin-top: 2px;
  }

  /* Center icons */
  .center-icons {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 0 8px;
  }

  .center-icon {
    color: var(--color-text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* Right AC controls */
  .ac-right {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 4px 0 8px;
    min-width: 180px;
    justify-content: flex-end;
  }

  /* Blue accent line for left panel */
  .blue-line {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--color-primary);
  }

  .info-i {
    color: var(--color-text-secondary);
    font-size: 0.75rem;
    font-style: italic;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="screen">

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-bar-left">
      <span class="info-i">i</span>
    </div>
    <div class="status-bar-center-line">
      <span class="demo-mode-text">DEMO MODE</span>
      <div class="demo-line"></div>
    </div>
    <div class="status-bar-right">
      <!-- mute icon -->
      <span class="status-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="1" width="12" height="12" rx="1" stroke="#a0b8d0" stroke-width="1.2" fill="none"/>
          <line x1="3" y1="3" x2="11" y2="11" stroke="#a0b8d0" stroke-width="1.2"/>
        </svg>
      </span>
      <!-- bell icon -->
      <span class="status-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 2C5 2 4 3.5 4 5.5V9H10V5.5C10 3.5 9 2 7 2Z" stroke="#a0b8d0" stroke-width="1.1" fill="none"/>
          <line x1="7" y1="1" x2="7" y2="2" stroke="#a0b8d0" stroke-width="1.2"/>
          <path d="M5.5 9.5C5.5 10.3 6.2 11 7 11C7.8 11 8.5 10.3 8.5 9.5" stroke="#a0b8d0" stroke-width="1" fill="none"/>
        </svg>
      </span>
      <span class="status-temp">23 °c</span>
      <!-- mic off -->
      <span class="status-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="5" y="2" width="4" height="7" rx="2" stroke="#a0b8d0" stroke-width="1.1" fill="none"/>
          <line x1="3" y1="3" x2="11" y2="11" stroke="#a0b8d0" stroke-width="1.1"/>
          <line x1="7" y1="9" x2="7" y2="12" stroke="#a0b8d0" stroke-width="1.1"/>
          <line x1="4.5" y1="12" x2="9.5" y2="12" stroke="#a0b8d0" stroke-width="1.1"/>
        </svg>
      </span>
      <!-- bluetooth -->
      <span class="status-icon">
        <svg width="10" height="14" viewBox="0 0 10 14" fill="none">
          <polyline points="2,3 8,8 5,11 5,2 8,5 2,10" stroke="#a0b8d0" stroke-width="1.2" fill="none"/>
        </svg>
      </span>
      <!-- wifi -->
      <span class="status-icon">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M1 4C3.5 1.5 12.5 1.5 15 4" stroke="#a0b8d0" stroke-width="1.1" fill="none"/>
          <path d="M3 6.5C4.5 5 11.5 5 13 6.5" stroke="#a0b8d0" stroke-width="1.1" fill="none"/>
          <path d="M5 9C6 8 10 8 11 9" stroke="#a0b8d0" stroke-width="1.1" fill="none"/>
          <circle cx="8" cy="11" r="1" fill="#a0b8d0"/>
        </svg>
      </span>
      <!-- signal bars -->
      <span class="status-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="9" width="2" height="4" fill="#a0b8d0"/>
          <rect x="4" y="7" width="2" height="6" fill="#a0b8d0"/>
          <rect x="7" y="5" width="2" height="8" fill="#a0b8d0"/>
          <rect x="10" y="2" width="2" height="11" fill="#a0b8d0" opacity="0.4"/>
        </svg>
      </span>
      <div class="status-avatar"></div>
      <span class="status-time">11:31 <sup>am</sup></span>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <!-- Green road/traffic icon -->
      <div class="sidebar-icon" style="margin-top: 8px;">
        <svg width="32" height="20" viewBox="0 0 32 20" fill="none">
          <rect x="2" y="4" width="20" height="12" rx="2" fill="none" stroke="#00c853" stroke-width="2"/>
          <line x1="7" y1="4" x2="7" y2="16" stroke="#00c853" stroke-width="1.5"/>
          <line x1="12" y1="4" x2="12" y2="16" stroke="#00c853" stroke-width="1.5"/>
          <line x1="17" y1="4" x2="17" y2="16" stroke="#00c853" stroke-width="1.5"/>
          <circle cx="26" cy="10" r="4" fill="#00c853" opacity="0.8"/>
        </svg>
      </div>

      <!-- Car icon with phone/notification -->
      <div class="sidebar-icon" style="position: relative;">
        <svg width="38" height="32" viewBox="0 0 38 32" fill="none">
          <path d="M8 22H30L27 12H11L8 22Z" fill="#a0b8d0" opacity="0.3"/>
          <path d="M6 22H32M8 22L12 14H26L30 22M10 26H14M24 26H28" stroke="#a0b8d0" stroke-width="1.5" fill="none"/>
          <rect x="2" y="19" width="4" height="6" rx="1" fill="#a0b8d0" opacity="0.5"/>
          <rect x="32" y="19" width="4" height="6" rx="1" fill="#a0b8d0" opacity="0.5"/>
          <!-- red dot -->
          <circle cx="20" cy="12" r="4" fill="#e53935"/>
          <!-- small phone shape -->
          <rect x="18" y="10" width="4" height="5" rx="0.5" fill="white" opacity="0.8"/>
        </svg>
      </div>

      <!-- Package/settings icon -->
      <div class="sidebar-icon" style="margin-top: 8px;">
        <svg width="26" height="20" viewBox="0 0 26 20" fill="none">
          <rect x="1" y="3" width="14" height="14" rx="1" stroke="#a0b8d0" stroke-width="1.5" fill="none"/>
          <line x1="5" y1="3" x2="5" y2="17" stroke="#a0b8d0" stroke-width="1"/>
          <line x1="11" y1="3" x2="11" y2="17" stroke="#a0b8d0" stroke-width="1"/>
          <circle cx="21" cy="10" r="4" fill="none" stroke="#a0b8d0" stroke-width="1.5"/>
          <line x1="21" y1="6" x2="21" y2="5" stroke="#a0b8d0" stroke-width="1.5"/>
          <line x1="21" y1="14" x2="21" y2="15" stroke="#a0b8d0" stroke-width="1.5"/>
          <line x1="17" y1="10" x2="16" y2="10" stroke="#a0b8d0" stroke-width="1.5"/>
          <line x1="25" y1="10" x2="26" y2="10" stroke="#a0b8d0" stroke-width="1.5"/>
        </svg>
      </div>
    </div>

    <!-- LEFT PANEL -->
    <div class="left-panel" style="position: relative;">
      <div class="blue-line"></div>

      <!-- GRID CARDS SECTION -->
      <div class="grid-section">
        <div class="grid-section-inner">
          <!-- Card 1: ChatBMW -->
          <div class="grid-card grid-card-1">
            <div class="grid-card-content">
              <div class="chat-bmw-icon">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <rect width="20" height="20" rx="4" fill="url(#chatGrad)"/>
                  <defs>
                    <linearGradient id="chatGrad" x1="0" y1="0" x2="20" y2="20">
                      <stop offset="0%" stop-color="#e040fb"/>
                      <stop offset="50%" stop-color="#f06292"/>
                      <stop offset="100%" stop-color="#ff7043"/>
                    </linearGradient>
                  </defs>
                  <text x="3" y="13" font-size="7" fill="white" font-weight="700">Chat</text>
                  <text x="2" y="20" font-size="6" fill="white" font-weight="700">BMW</text>
                </svg>
              </div>
              <span class="card-label">ChatBMW</span>
            </div>
            <span class="card-number">1</span>
          </div>

          <!-- Card 2: Shortcut -->
          <div class="grid-card">
            <div class="grid-card-content shortcut-icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="white">
                <line x1="7" y1="1" x2="7" y2="13" stroke="white" stroke-width="1.5"/>
                <line x1="1" y1="7" x2="13" y2="7" stroke="white" stroke-width="1.5"/>
              </svg>
              <span class="card-label">Shortcut</span>
            </div>
            <span class="card-number">2</span>
          </div>

          <!-- Card 3 (empty) -->
          <div class="grid-card">
            <span class="card-number">3</span>
          </div>

          <!-- Card 4 (empty) -->
          <div class="grid-card">
            <span class="card-number">4</span>
          </div>
        </div>
      </div>

      <!-- CONNECT SECTION -->
      <div class="connect-section">
        <div class="connect-title">Connect to MmiLab BMW</div>
        <div class="connect-content">
          <div class="phone-mockup">
            <svg width="30" height="50" viewBox="0 0 30 50" fill="none">
              <rect x="2" y="2" width="26" height="46" rx="4" fill="none" stroke="#2a82f0" stroke-width="1.5"/>
              <rect x="9" y="2" width="12" height="3" rx="1.5" fill="#2a82f0" opacity="0.6"/>
              <circle cx="15" cy="44" r="2" fill="#2a82f0" opacity="0.5"/>
            </svg>
          </div>
          <div class="connect-btn">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="white">
              <line x1="6" y1="1" x2="6" y2="11" stroke="white" stroke-width="1.5"/>
              <line x1="1" y1="6" x2="11" y2="6" stroke="white" stroke-width="1.5"/>
            </svg>
            Connect
          </div>
        </div>
      </div>
    </div>

    <!-- MAP AREA -->
    <div class="map-area">
      <!-- Map SVG -->
      <svg class="map-svg" viewBox="0 0 760 460" preserveAspectRatio="xMidYMid slice">
        <!-- Background -->
        <rect width="760" height="460" fill="#1a3a4a"/>

        <!-- Dark green/teal areas (blocks) -->
        <rect x="0" y="0" width="760" height="460" fill="#1a3a4a"/>

        <!-- Blue building blocks -->
        <rect x="340" y="200" width="80" height="60" fill="#1464c8" opacity="0.7"/>
        <rect x="310" y="250" width="50" height="40" fill="#1464c8" opacity="0.6"/>
        <rect x="380" y="240" width="60" height="50" fill="#1464c8" opacity="0.5"/>
        <rect x="350" y="300" width="100" height="70" fill="#1464c8" opacity="0.6"/>

        <!-- Road network - main roads (light gray) -->
        <!-- Horizontal main road -->
        <path d="M0 200 L760 160" stroke="#b0c0c8" stroke-width="18" fill="none"/>
        <path d="M0 200 L760 160" stroke="#8090a0" stroke-width="14" fill="none"/>

        <!-- Vertical road left -->
        <path d="M200 0 L180 460" stroke="#8090a0" stroke-width="14" fill="none"/>

        <!-- Diagonal/curved roads -->
        <path d="M350 0 L380 180 L420 460" stroke="#8090a0" stroke-width="12" fill="none"/>
        <path d="M500 0 L520 160 L600 460" stroke="#8090a0" stroke-width="12" fill="none"/>
        <path d="M640 0 L660 160 L700 460" stroke="#8090a0" stroke-width="10" fill="none"/>

        <!-- Curved road upper right -->
        <path d="M500 0 Q580 80 700 60 Q780 50 760 120" stroke="#8090a0" stroke-width="14" fill="none"/>

        <!-- Intersection area roads -->
        <path d="M0 280 L760 260" stroke="#6a8090" stroke-width="10" fill="none"/>
        <path d="M0 320 L300 310 L400 350 L760 340" stroke="#6a8090" stroke-width="8" fill="none"/>

        <!-- Small connecting roads -->
        <path d="M200 200 L350 185" stroke="#6a8090" stroke-width="8" fill="none"/>
        <path d="M380 185 L520 168" stroke="#6a8090" stroke-width="8" fill="none"/>
        <path d="M180 300 L310 290" stroke="#5a7080" stroke-width="6" fill="none"/>
        <path d="M420 280 L500 270" stroke="#5a7080" stroke-width="6" fill="none"/>

        <!-- Road lane markings -->
        <path d="M0 198 L760 158" stroke="white" stroke-width="1" stroke-dasharray="20,15" opacity="0.4"/>

        <!-- Building footprints -->
        <rect x="50" y="220" width="100" height="60" fill="#1a4a3a" opacity="0.8"/>
        <rect x="60" y="290" width="80" height="50" fill="#1a4050" opacity="0.7"/>
        <rect x="440" y="300" width="90" height="80" fill="#1a4050" opacity="0.6"/>
        <rect x="540" y="280" width="70" height="60" fill="#1a4050" opacity="0.6"/>
        <rect x="600" y="200" width="120" height="80" fill="#1a3a4a" opacity="0.5"/>

        <!-- Blue highlighted buildings -->
        <rect x="330" y="195" width="75" height="55" fill="#1464c8" opacity="0.75" rx="1"/>
        <rect x="305" y="245" width="55" height="45" fill="#1464c8" opacity="0.65" rx="1"/>
        <rect x="375" y="235" width="65" height="50" fill="#1050a0" opacity="0.6" rx="1"/>
        <rect x="340" y="295" width="110" height="75" fill="#1464c8" opacity="0.65" rx="1"/>

        <!-- Road outlines for depth -->
        <path d="M350 0 L380 180 L420 460" stroke="#c0d0d8" stroke-width="2" fill="none" opacity="0.5"/>
        <path d="M200 0 L180 460" stroke="#c0d0d8" stroke-width="2" fill="none" opacity="0.5"/>
        <path d="M0 200 L760 160" stroke="#d0e0e8" stroke-width="2" fill="none" opacity="0.5"/>
      </svg>

      <!-- Warning triangle -->
      <div class="map-warning">
        <svg width="36" height="32" viewBox="0 0 36 32" fill="none">
          <polygon points="18,2 34,30 2,30" fill="white" stroke="#cccccc" stroke-width="1"/>
          <text x="18" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#222">!</text>
        </svg>
      </div>

      <!-- Road number badge -->
      <div class="road-badge">472</div>

      <!-- Centre vehicle button -->
      <div class="centre-vehicle-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="white">
          <polygon points="2,12 7,2 12,12 7,9" fill="white"/>
        </svg>
        Centre vehicle
      </div>

      <!-- Assist View button -->
      <div class="assist-view-btn">
        ASSIST<br>VIEW
      </div>
    </div>

  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">

    <!-- Left AC -->
    <div class="ac-left">
      <!-- engine/AC icon -->
      <div class="ac-icon">
        <svg width="20" height="16" viewBox="0 0 20 16" fill="none">
          <rect x="1" y="4" width="10" height="8" rx="1" stroke="#a0b8d0" stroke-width="1.2" fill="none"/>
          <path d="M11 6H15L18 8L15 10H11" stroke="#a0b8d0" stroke-width="1.2" fill="none"/>
          <circle cx="5" cy="8" r="2" stroke="#a0b8d0" stroke-width="1" fill="none"/>
        </svg>
      </div>
      <div class="bottom-divider"></div>
      <span class="ac-btn">−</span>
      <div class="ac-control">
        <div class="ac-top">
          <span class="ac-status">
            OFF
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
              <path d="M2 5C2 3 4 1 6 1C8 1 10 3 10 5" stroke="#a0b8d0" stroke-width="1.2" fill="none"/>
              <path d="M4 5C4 4 5 3 6 3C7 3 8 4 8 5" stroke="#a0b8d0" stroke-width="1" fill="none"/>
              <line x1="6" y1="5" x2="6" y2="9" stroke="#a0b8d0" stroke-width="1.2"/>
            </svg>
          </span>
        </div>
        <div class="ac-bar"></div>
        <div class="ac-label">A/C OFF</div>
      </div>
      <span class="ac-btn">+</span>
    </div>

    <div class="bottom-divider"></div>

    <!-- Center icons -->
    <div class="center-icons">
      <!-- Music note -->
      <div class="center-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6 12V4L14 2V10" stroke="#a0b8d0" stroke-width="1.3" fill="none"/>
          <circle cx="4.5" cy="12" r="2" stroke="#a0b8d0" stroke-width="1.3" fill="none"/>
          <circle cx="12.5" cy="10" r="2" stroke="#a0b8d0" stroke-width="1.3" fill="none"/>
        </svg>
      </div>
      <!-- Navigation arrow -->
      <div class="center-icon">
        <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
          <polygon points="7,1 13,15 7,11 1,15" fill="#a0b8d0"/>
        </svg>
      </div>
      <!-- Turn arrow -->
      <div class="center-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 12 Q4 5 10 5" stroke="#a0b8d0" stroke-width="1.5" fill="none"/>
          <polyline points="8,2 11,5 8,8" stroke="#a0b8d0" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <!-- Grid/home -->
      <div class="center-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="6" height="6" rx="0.5" fill="#a0b8d0"/>
          <rect x="9" y="1" width="6" height="6" rx="0.5" fill="#a0b8d0"/>
          <rect x="1" y="9" width="6" height="6" rx="0.5" fill="#a0b8d0"/>
          <rect x="9" y="9" width="6" height="6" rx="0.5" fill="#a0b8d0"/>
        </svg>
      </div>
      <!-- Fan -->
      <div class="center-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="2" fill="#a0b8d0"/>
          <path d="M9 7 C9 5 10 2 12 2 C14 2 14 4 12 5 C10 6 9 7 9 7Z" fill="#a0b8d0" opacity="0.7"/>
          <path d="M9 11 C9 13 8 16 6 16 C4 16 4 14 6 13 C8 12 9 11 9 11Z" fill="#a0b8d0" opacity="0.7"/>
          <path d="M7 9 C5 9 2 8 2 6 C2 4 4 4 5 6 C6 8 7 9 7 9Z" fill="#a0b8d0" opacity="0.7"/>
          <path d="M11 9 C13 9 16 10 16 12 C16 14 14 14 13 12 C12 10 11 9 11 9Z" fill="#a0b8d0" opacity="0.7"/>
        </svg>
      </div>
      <!-- Car -->
      <div class="center-icon">
        <svg width="22" height="14" viewBox="0 0 22 14" fill="none">
          <path d="M3 9 L5 4 L17 4 L19 9 Z" stroke="#a0b8d0" stroke-width="1.2" fill="none"/>
          <rect x="1" y="9" width="20" height="3" rx="0.5" stroke="#a0b8d0" stroke-width="1.2" fill="none"/>
          <circle cx="5.5" cy="12.5" r="1.5" stroke="#a0b8d0" stroke-width="1" fill="none"/>
          <circle cx="16.5" cy="12.5" r="1.5" stroke="#a0b8d0" stroke-width="1" fill="none"/>
          <path d="M7 4 L8 9" stroke="#a0b8d0" stroke-width="0.8"/>
          <path d="M15 4 L14 9" stroke="#a0b8d0" stroke-width="0.8"/>
        </svg>
      </div>
      <!-- Dots/menu -->
      <div class="center-icon">
        <svg width="20" height="10" viewBox="0 0 20 10" fill="none">
          <circle cx="2" cy="5" r="1.5" fill="#a0b8d0"/>
          <circle cx="7" cy="5" r="1.5" fill="#a0b8d0"/>
          <circle cx="12" cy="5" r="1.5" fill="#a0b8d0"/>
          <circle cx="17" cy="5" r="1.5" fill="#a0b8d0"/>
        </svg>
      </div>
    </div>

    <div class="bottom-divider"></div>

    <!-- Right AC -->
    <div class="ac-right">
      <span class="ac-btn">−</span>
      <div class="ac-control">
        <div class="ac-top">
          <span class="ac-status">
            OFF
            <svg width="14" height="12" viewBox="0 0 14 12" fill="none">
              <path d="M2 4 L7 1 L12 4 L12 10 L2 10 Z" stroke="#a0b8d0" stroke-width="1.2" fill="none"/>
              <line x1="7" y1="1" x2="7" y2="10" stroke="#a0b8d0" stroke-width="0.8" opacity="0.5"/>
            </svg>
          </span>
        </div>
        <div class="ac-bar"></div>
        <div class="ac-label">A/C OFF</div>
      </div>
      <span class="ac-btn">+</span>
      <div class="bottom-divider"></div>
      <div class="ac-icon">
        <svg width="20" height="16" viewBox="0 0 20 16" fill="none">
          <rect x="1" y="4" width="10" height="8" rx="1" stroke="#a0b8d0" stroke-width="1.2" fill="none"/>
          <path d="M11 6H15L18 8L15 10H11" stroke="#a0b8d0" stroke-width="1.2" fill="none"/>
          <circle cx="5" cy="8" r="2" stroke="#a0b8d0" stroke-width="1" fill="none"/>
        </svg>
      </div>
    </div>

  </div>

</div>
</body>
</html>
