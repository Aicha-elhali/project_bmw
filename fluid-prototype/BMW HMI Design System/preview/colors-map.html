<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body class="preview-card">
<div class="col" style="gap:14px">
  <div class="label">Map palette · night mode</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <div style="background:#0F1A2C;border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:8px">
      <div style="height:28px;background:#0F1A2C;border-radius:4px;border:1px solid rgba(255,255,255,0.08)"></div>
      <div style="font-size:13px;color:#fff">Canvas</div>
      <div style="font-size:11px;color:#8C9BB0;font-variant-numeric:tabular-nums">#0F1A2C</div>
    </div>
    <div style="background:#0F1A2C;border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:8px">
      <div style="height:28px;background:#1A3A5F;border-radius:4px"></div>
      <div style="font-size:13px;color:#fff">Water</div>
      <div style="font-size:11px;color:#8C9BB0;font-variant-numeric:tabular-nums">#1A3A5F</div>
    </div>
    <div style="background:#0F1A2C;border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:8px">
      <div style="height:28px;background:#1F3540;border-radius:4px"></div>
      <div style="font-size:13px;color:#fff">Park</div>
      <div style="font-size:11px;color:#8C9BB0;font-variant-numeric:tabular-nums">#1F3540</div>
    </div>
    <div style="background:#0F1A2C;border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;align-items:flex-start">
      <svg width="100%" height="28" viewBox="0 0 100 28" preserveAspectRatio="none"><line x1="0" y1="14" x2="100" y2="14" stroke="#3A4A66" stroke-width="3"/></svg>
      <div style="font-size:13px;color:#fff">Road · minor</div>
      <div style="font-size:11px;color:#8C9BB0;font-variant-numeric:tabular-nums">#3A4A66</div>
    </div>
    <div style="background:#0F1A2C;border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;align-items:flex-start">
      <svg width="100%" height="28" viewBox="0 0 100 28" preserveAspectRatio="none"><line x1="0" y1="14" x2="100" y2="14" stroke="#FFFFFF" stroke-width="3"/></svg>
      <div style="font-size:13px;color:#fff">Road · major</div>
      <div style="font-size:11px;color:#8C9BB0;font-variant-numeric:tabular-nums">#FFFFFF</div>
    </div>
    <div style="background:#0F1A2C;border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;align-items:flex-start">
      <svg width="100%" height="28" viewBox="0 0 100 28" preserveAspectRatio="none"><line x1="0" y1="14" x2="100" y2="14" stroke="#5BA3FF" stroke-width="4"/></svg>
      <div style="font-size:13px;color:#fff">Highway / route</div>
      <div style="font-size:11px;color:#8C9BB0;font-variant-numeric:tabular-nums">#5BA3FF</div>
    </div>
    <div style="background:#0F1A2C;border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;align-items:flex-start">
      <svg width="100%" height="28" viewBox="0 0 100 28" preserveAspectRatio="none"><line x1="0" y1="14" x2="100" y2="14" stroke="#FF4040" stroke-width="4"/></svg>
      <div style="font-size:13px;color:#fff">Traffic jam</div>
      <div style="font-size:11px;color:#8C9BB0;font-variant-numeric:tabular-nums">#FF4040</div>
    </div>
    <div style="background:#0F1A2C;border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;align-items:flex-start">
      <div style="display:flex;gap:8px;height:28px;align-items:center">
        <span style="width:18px;height:18px;border-radius:999px;background:#1C69D4;border:1.5px solid #fff"></span>
        <span style="width:18px;height:18px;border-radius:999px;background:#3CD278;border:1.5px solid #fff"></span>
        <span style="width:18px;height:18px;border-radius:999px;background:#F0C040;border:1.5px solid #fff"></span>
      </div>
      <div style="font-size:13px;color:#fff">Pins · self / ok / warn</div>
      <div style="font-size:11px;color:#8C9BB0;font-variant-numeric:tabular-nums">#1C69D4 · #3CD278 · #F0C040</div>
    </div>
  </div>
</div>
</body></html>
