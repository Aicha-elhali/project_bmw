<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body class="preview-card">
<div class="col" style="gap:12px">
  <div class="label">Surfaces · dark cockpit canvas</div>
  <div class="row" style="gap:6px">
    <div class="swatch" style="background:#0A1428"><span class="name">canvas</span><span class="hex">0A1428</span></div>
    <div class="swatch" style="background:#0E1B30"><span class="name">canvas-alt</span><span class="hex">0E1B30</span></div>
    <div class="swatch" style="background:#0F1A2C"><span class="name">map-night</span><span class="hex">0F1A2C</span></div>
    <div class="swatch" style="background:#1A2840"><span class="name">map-alt</span><span class="hex">1A2840</span></div>
  </div>
  <div class="row" style="gap:6px">
    <div class="swatch" style="background:linear-gradient(180deg,#243757,#1B2A45)"><span class="name">elevated</span><span class="hex">1B2A45 ↑ 243757</span></div>
    <div class="swatch" style="background:linear-gradient(180deg,#34538D,#2A4170)"><span class="name">strong</span><span class="hex">2A4170 ↑ 34538D</span></div>
    <div class="swatch" style="background:#34538D"><span class="name">accent</span><span class="hex">34538D</span></div>
  </div>
  <div class="tiny">No pure black. Every surface is dark blue-black; cards use a top→bottom gradient for the "glass" feel.</div>
</div>
</body></html>
