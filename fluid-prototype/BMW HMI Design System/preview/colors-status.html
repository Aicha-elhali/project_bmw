<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body class="preview-card">
<div class="col" style="gap:12px">
  <div class="label">Status colors · used sparingly</div>
  <div class="row" style="gap:8px">
    <div class="swatch" style="background:#F0C040;color:#0A1428"><span class="name">warning</span><span class="hex">F0C040</span></div>
    <div class="swatch" style="background:#FFCC00;color:#0A1428"><span class="name">warn-strong</span><span class="hex">FFCC00</span></div>
    <div class="swatch" style="background:#E63946"><span class="name">danger</span><span class="hex">E63946</span></div>
    <div class="swatch" style="background:#FF4040"><span class="name">danger-bright</span><span class="hex">FF4040</span></div>
    <div class="swatch" style="background:#3CD278;color:#072414"><span class="name">success</span><span class="hex">3CD278</span></div>
    <div class="swatch" style="background:#5BA3FF;color:#071D3D"><span class="name">info</span><span class="hex">5BA3FF</span></div>
  </div>
  <div class="tiny">Warning = wrench / drive-carefully. Danger = open door / unfastened belt. Success = available chargers. Info = active tab text.</div>
</div>
</body></html>
