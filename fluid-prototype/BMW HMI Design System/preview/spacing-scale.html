<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body class="preview-card">
<div class="col" style="gap:14px">
  <div class="label">Spacing scale (px)</div>
  <div style="display:grid;grid-template-columns:repeat(8,auto);gap:14px;align-items:end">
    <div class="col"><div style="background:#1C69D4;width:4px;height:4px"></div><div class="tiny">1·4</div></div>
    <div class="col"><div style="background:#1C69D4;width:8px;height:8px"></div><div class="tiny">2·8</div></div>
    <div class="col"><div style="background:#1C69D4;width:12px;height:12px"></div><div class="tiny">3·12</div></div>
    <div class="col"><div style="background:#1C69D4;width:16px;height:16px"></div><div class="tiny">4·16</div></div>
    <div class="col"><div style="background:#1C69D4;width:24px;height:24px"></div><div class="tiny">6·24</div></div>
    <div class="col"><div style="background:#1C69D4;width:32px;height:32px"></div><div class="tiny">8·32</div></div>
    <div class="col"><div style="background:#1C69D4;width:48px;height:48px"></div><div class="tiny">12·48</div></div>
    <div class="col"><div style="background:#1C69D4;width:64px;height:64px"></div><div class="tiny">16·64 ★ touch</div></div>
  </div>
  <div class="tiny">Touch-target minimum is 64×64. Card padding 16/24, section gaps 32–48.</div>
</div>
</body></html>
