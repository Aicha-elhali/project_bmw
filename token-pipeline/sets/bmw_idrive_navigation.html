<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW iDrive Navigation</title>
<style>
:root {
  --color-primary: #1a6fc4;
  --color-primary-hover: #155a9e;
  --color-primary-light: #2a85e0;
  --color-primary-subtle: rgba(26,111,196,0.18);
  --color-background: #050d1f;
  --color-background-light: #0a1a35;
  --color-surface: #0d2044;
  --color-text: #e8f0ff;
  --color-text-dark: #0a1428;
  --color-text-secondary: #a0b8d8;
  --color-text-muted: #5a7a9a;
  --color-text-on-dark: #ffffff;
  --color-text-on-dark-secondary: #b0cce8;
  --color-text-on-dark-muted: #5a7a9a;
  --color-accent: #3aaeff;
  --color-border: rgba(58,174,255,0.25);
  --color-border-dark: rgba(26,111,196,0.5);
  --color-focus-ring: #3aaeff;
  --color-success: #00e676;
  --color-error: #ff3d3d;
  --color-overlay: rgba(5,13,31,0.75);
  --color-shadow: rgba(0,20,60,0.7);
  --color-shadow-strong: rgba(0,10,40,0.95);
  --color-background-gradient: radial-gradient(ellipse at 50% 60%, rgba(26,111,196,0.45) 0%, rgba(5,13,31,1) 75%);
  --color-glow-blue: rgba(58,174,255,0.35);
  --color-surface-button: rgba(18,54,110,0.85);
  --color-surface-button-active: rgba(26,90,160,0.95);
  --spacing-xs: 0.25rem;
  --spacing-sm: 0.5rem;
  --spacing-md: 1rem;
  --spacing-lg: 1.5rem;
  --spacing-xl: 2rem;
  --spacing-xxl: 3rem;
  --spacing-section: 4rem;
  --spacing-touch-target: 3rem;
  --font-heading1-size: 1.75rem;
  --font-heading2-size: 1.25rem;
  --font-heading3-size: 1rem;
  --font-body-size: 0.875rem;
  --font-body-small-size: 0.75rem;
  --font-small-size: 0.625rem;
  --font-label-size: 0.6875rem;
  --font-label-letter-spacing: 0.04em;
  --radius-none: 0;
  --radius-sm: 0.25rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-xxl: 1.5rem;
  --radius-full: 9999px;
  --shadow-sm: 0 2px 8px rgba(0,20,60,0.6);
  --shadow-md: 0 4px 24px rgba(0,20,80,0.75), 0 0 12px rgba(58,174,255,0.15);
  --transition-fast: 0.15s ease;
  --transition-medium: 0.3s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "BMW Type Next", "Helvetica Neue", Arial, Helvetica, sans-serif;
  background: #000;
  color: var(--color-text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}

.display {
  width: 1280px;
  height: 480px;
  background: var(--color-background);
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
  display: flex;
  flex-direction: column;
}

/* ── Top bar ── */
.top-bar {
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(5,13,31,0.9);
  border-bottom: 1px solid rgba(58,174,255,0.08);
  flex-shrink: 0;
}

.demo-label {
  font-size: var(--font-small-size);
  color: var(--color-text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* ── Main area ── */
.main {
  flex: 1;
  display: flex;
  min-height: 0;
}

/* ── Left panel ── */
.left-panel {
  width: 340px;
  flex-shrink: 0;
  background: var(--color-background-light);
  border-right: 1px solid rgba(58,174,255,0.08);
  display: flex;
  flex-direction: column;
  padding: var(--spacing-md);
  gap: var(--spacing-md);
}

.panel-tabs {
  display: flex;
  gap: var(--spacing-sm);
}

.tab-btn {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  padding: var(--spacing-sm) var(--spacing-md);
  background: var(--color-primary);
  border: none;
  border-radius: var(--radius-lg);
  color: var(--color-text-on-dark);
  font-family: inherit;
  font-size: var(--font-body-small-size);
  font-weight: 400;
  cursor: pointer;
  transition: background var(--transition-fast);
  white-space: nowrap;
}
.tab-btn:hover { background: var(--color-primary-hover); }

.tab-btn svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.panel-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: var(--spacing-md);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
}

.card-label {
  font-size: var(--font-label-size);
  color: var(--color-text-muted);
  letter-spacing: var(--font-label-letter-spacing);
}

.card-title {
  font-size: var(--font-body-size);
  color: var(--color-text-on-dark-secondary);
  font-weight: 300;
}

.connect-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--spacing-sm);
  padding: var(--spacing-sm) var(--spacing-lg);
  background: var(--color-surface-button);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  color: var(--color-accent);
  font-family: inherit;
  font-size: var(--font-body-small-size);
  cursor: pointer;
  transition: background var(--transition-fast);
  align-self: flex-start;
}
.connect-btn:hover { background: var(--color-surface-button-active); }

.panel-nav-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: auto;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  padding: var(--spacing-sm) var(--spacing-md);
  border-radius: var(--radius-md);
  font-size: var(--font-body-small-size);
  color: var(--color-text-secondary);
  cursor: pointer;
  transition: background var(--transition-fast);
}
.nav-item:hover { background: rgba(58,174,255,0.08); }
.nav-item.active {
  background: var(--color-primary-subtle);
  color: var(--color-accent);
}
.nav-item svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  opacity: 0.7;
}
.nav-item.active svg { opacity: 1; }

/* ── Map area ── */
.map-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--color-background);
}

.map-canvas {
  position: absolute;
  inset: 0;
}

.map-canvas svg { width: 100%; height: 100%; }

.map-road {
  stroke: rgba(58,174,255,0.12);
  stroke-width: 1.2;
  fill: none;
}
.map-road-main {
  stroke: rgba(58,174,255,0.22);
  stroke-width: 2;
  fill: none;
}
.map-road-highlight {
  stroke: var(--color-accent);
  stroke-width: 2.5;
  fill: none;
  filter: drop-shadow(0 0 4px rgba(58,174,255,0.4));
}

.map-label {
  position: absolute;
  font-size: var(--font-small-size);
  color: var(--color-text-muted);
  pointer-events: none;
}

.car-marker {
  position: absolute;
  top: 50%;
  left: 55%;
  transform: translate(-50%, -50%);
  width: 18px;
  height: 18px;
}
.car-marker::before {
  content: '';
  position: absolute;
  inset: -8px;
  background: radial-gradient(circle, rgba(58,174,255,0.35) 0%, transparent 70%);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
.car-marker svg { width: 18px; height: 18px; }

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.4); opacity: 0.2; }
}

.centre-btn {
  position: absolute;
  bottom: var(--spacing-md);
  right: var(--spacing-md);
  display: flex;
  align-items: center;
  gap: var(--spacing-xs);
  padding: var(--spacing-sm) var(--spacing-md);
  background: var(--color-surface-button);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  color: var(--color-text-on-dark-secondary);
  font-family: inherit;
  font-size: var(--font-body-small-size);
  cursor: pointer;
  backdrop-filter: blur(8px);
  transition: background var(--transition-fast);
}
.centre-btn:hover { background: var(--color-surface-button-active); }
.centre-btn svg { width: 16px; height: 16px; }

.zoom-controls {
  position: absolute;
  bottom: var(--spacing-md);
  left: var(--spacing-md);
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.zoom-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-surface-button);
  border: 1px solid var(--color-border);
  color: var(--color-text-on-dark-secondary);
  font-size: 1.1rem;
  cursor: pointer;
  transition: background var(--transition-fast);
}
.zoom-btn:first-child { border-radius: var(--radius-md) var(--radius-md) 0 0; }
.zoom-btn:last-child  { border-radius: 0 0 var(--radius-md) var(--radius-md); }
.zoom-btn:hover { background: var(--color-surface-button-active); }

/* ── Bottom bar ── */
.bottom-bar {
  height: 44px;
  background: rgba(5,13,31,0.95);
  border-top: 1px solid rgba(58,174,255,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--spacing-lg);
  flex-shrink: 0;
}

.climate-group {
  display: flex;
  align-items: center;
  gap: var(--spacing-lg);
}

.climate-item {
  display: flex;
  align-items: center;
  gap: var(--spacing-xs);
  font-size: var(--font-body-small-size);
  color: var(--color-text-secondary);
}

.climate-item .off-label {
  color: var(--color-text-muted);
  font-size: var(--font-label-size);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.climate-item .temp {
  color: var(--color-text);
  font-weight: 300;
}

.climate-item svg {
  width: 18px;
  height: 18px;
  opacity: 0.6;
}

.bottom-center {
  display: flex;
  align-items: center;
  gap: var(--spacing-xl);
}

.bottom-center .ac-label {
  font-size: var(--font-body-small-size);
  color: var(--color-accent);
}
</style>
</head>
<body>

<div class="display">

  <!-- Top bar -->
  <div class="top-bar">
    <span class="demo-label">Demo Mode</span>
  </div>

  <!-- Main content -->
  <div class="main">

    <!-- Left panel -->
    <div class="left-panel">
      <div class="panel-tabs">
        <button class="tab-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-7 12h-2v-2h2v2zm0-4h-2V6h2v4z"/></svg>
          ChatGPT
        </button>
        <button class="tab-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.96 7.96 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18a6 6 0 1 1 0-12c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          Shortcut
        </button>
      </div>

      <div class="panel-card">
        <span class="card-label">Connected to</span>
        <span class="card-title">iPhone_Joe_Device</span>
        <button class="connect-btn">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          Connect
        </button>
      </div>

      <nav class="panel-nav-list">
        <div class="nav-item active">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
          Navigation
        </div>
        <div class="nav-item">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
          Media
        </div>
        <div class="nav-item">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 15.5c-1.25 0-2.45-.2-3.57-.57a1 1 0 0 0-1.02.24l-2.2 2.2a15.05 15.05 0 0 1-6.59-6.59l2.2-2.2a1 1 0 0 0 .24-1.02A11.4 11.4 0 0 1 8.5 4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1 17 17 0 0 0 17 17 1 1 0 0 0 1-1v-3.5a1 1 0 0 0-1-1z"/></svg>
          Phone
        </div>
        <div class="nav-item">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94a7 7 0 0 0 .06-.94 7 7 0 0 0-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58a7 7 0 0 0-.06.94c0 .32.02.64.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
          Settings
        </div>
      </nav>
    </div>

    <!-- Map area -->
    <div class="map-area">
      <div class="map-canvas">
        <svg viewBox="0 0 940 408" preserveAspectRatio="xMidYMid slice">
          <!-- Grid roads -->
          <line class="map-road" x1="0" y1="60" x2="940" y2="60"/>
          <line class="map-road" x1="0" y1="150" x2="940" y2="150"/>
          <line class="map-road" x1="0" y1="260" x2="940" y2="260"/>
          <line class="map-road" x1="0" y1="350" x2="940" y2="350"/>

          <line class="map-road" x1="120" y1="0" x2="120" y2="408"/>
          <line class="map-road" x1="300" y1="0" x2="300" y2="408"/>
          <line class="map-road" x1="500" y1="0" x2="500" y2="408"/>
          <line class="map-road" x1="680" y1="0" x2="680" y2="408"/>
          <line class="map-road" x1="850" y1="0" x2="850" y2="408"/>

          <!-- Main roads -->
          <path class="map-road-main" d="M0,200 Q200,190 400,210 Q600,230 940,180"/>
          <path class="map-road-main" d="M350,0 Q370,120 380,200 Q390,300 420,408"/>
          <path class="map-road-main" d="M600,0 Q580,100 570,200 Q560,320 540,408"/>

          <!-- Diagonal roads -->
          <line class="map-road" x1="0" y1="0" x2="400" y2="350"/>
          <line class="map-road" x1="200" y1="0" x2="700" y2="408"/>
          <line class="map-road" x1="940" y1="80" x2="500" y2="408"/>

          <!-- Highlighted route -->
          <path class="map-road-highlight" d="M520,380 Q510,300 500,220 Q490,170 480,140 Q470,100 520,80 Q580,55 650,50"/>

          <!-- Area blocks -->
          <rect x="130" y="70" width="160" height="70" rx="4" fill="rgba(13,32,68,0.5)" stroke="rgba(58,174,255,0.06)" stroke-width="0.5"/>
          <rect x="310" y="165" width="80" height="80" rx="4" fill="rgba(13,32,68,0.4)" stroke="rgba(58,174,255,0.06)" stroke-width="0.5"/>
          <rect x="510" y="70" width="160" height="70" rx="4" fill="rgba(13,32,68,0.5)" stroke="rgba(58,174,255,0.06)" stroke-width="0.5"/>
          <rect x="690" y="165" width="150" height="80" rx="4" fill="rgba(13,32,68,0.4)" stroke="rgba(58,174,255,0.06)" stroke-width="0.5"/>
          <rect x="130" y="270" width="160" height="70" rx="4" fill="rgba(13,32,68,0.5)" stroke="rgba(58,174,255,0.06)" stroke-width="0.5"/>
          <rect x="690" y="270" width="150" height="70" rx="4" fill="rgba(13,32,68,0.4)" stroke="rgba(58,174,255,0.06)" stroke-width="0.5"/>
        </svg>
      </div>

      <!-- Street labels -->
      <span class="map-label" style="top:42px; left:420px;">Leopoldstraße</span>
      <span class="map-label" style="top:185px; left:160px;">Schleißheimer Str.</span>
      <span class="map-label" style="top:240px; left:600px;">Prinzregentenstraße</span>
      <span class="map-label" style="top:335px; left:320px;">Lindwurmstraße</span>

      <!-- Car marker -->
      <div class="car-marker">
        <svg viewBox="0 0 24 24" fill="var(--color-accent)">
          <path d="M12 2l-4 9h8l-4-9zm-4 9l4 11 4-11H8z" opacity="0.9"/>
        </svg>
      </div>

      <!-- Zoom controls -->
      <div class="zoom-controls">
        <button class="zoom-btn">+</button>
        <button class="zoom-btn">−</button>
      </div>

      <!-- Centre vehicle button -->
      <button class="centre-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm8.94 3A8.99 8.99 0 0 0 13 3.06V1h-2v2.06A8.99 8.99 0 0 0 3.06 11H1v2h2.06A8.99 8.99 0 0 0 11 20.94V23h2v-2.06A8.99 8.99 0 0 0 20.94 13H23v-2h-2.06zM12 19a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"/></svg>
        Centre vehicle
      </button>
    </div>

  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="climate-group">
      <div class="climate-item">
        <span class="off-label">OFF</span>
      </div>
      <div class="climate-item">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 11h-4.17l3.24-3.24-1.41-1.42L15 11h-2V9l4.66-4.66-1.42-1.41L13 6.17V2h-2v4.17L7.76 2.93 6.34 4.34 11 9v2H9L4.34 6.34 2.93 7.76 6.17 11H2v2h4.17l-3.24 3.24 1.41 1.42L9 13h2v2l-4.66 4.66 1.42 1.41L11 17.83V22h2v-4.17l3.24 3.24 1.42-1.41L13 15v-2h2l4.66 4.66 1.41-1.42L17.83 13H22z"/></svg>
        <span class="temp">A/C 24°</span>
      </div>
    </div>

    <div class="bottom-center">
      <div class="climate-item">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 6v3l4-4-4-4v3a8 8 0 0 0-8 8c0 1.57.46 3.03 1.24 4.26L6.7 14.8A5.9 5.9 0 0 1 6 12a6 6 0 0 1 6-6zm6.76 1.74L17.3 9.2c.44.84.7 1.79.7 2.8a6 6 0 0 1-6 6v-3l-4 4 4 4v-3a8 8 0 0 0 8-8c0-1.57-.46-3.03-1.24-4.26z"/></svg>
        <span class="ac-label">AUTO</span>
      </div>
    </div>

    <div class="climate-group">
      <div class="climate-item">
        <span class="temp">A/C 24°</span>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 11h-4.17l3.24-3.24-1.41-1.42L15 11h-2V9l4.66-4.66-1.42-1.41L13 6.17V2h-2v4.17L7.76 2.93 6.34 4.34 11 9v2H9L4.34 6.34 2.93 7.76 6.17 11H2v2h4.17l-3.24 3.24 1.41 1.42L9 13h2v2l-4.66 4.66 1.42 1.41L11 17.83V22h2v-4.17l3.24 3.24 1.42-1.41L13 15v-2h2l4.66 4.66 1.41-1.42L17.83 13H22z"/></svg>
      </div>
      <div class="climate-item">
        <span class="off-label">OFF</span>
      </div>
    </div>
  </div>

</div>

</body>
</html>
